<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>תלם מרקט | האתר בהקמה</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;700;900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  min-height: 100vh;
  font-family: 'Heebo', sans-serif;
  background: #1a1a1a;
  color: #fff;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
}

/* Background image overlay */
body::before {
  content: '';
  position: absolute;
  inset: 0;
  background:
    linear-gradient(180deg, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0.5) 50%, rgba(0,0,0,0.85) 100%);
  z-index: 1;
}

/* Diagonal stripes accent */
.stripes {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 8px;
  background: repeating-linear-gradient(
    -45deg,
    #f5c518,
    #f5c518 10px,
    #1a1a1a 10px,
    #1a1a1a 20px
  );
  z-index: 10;
}
.stripes-bottom {
  position: absolute;
  bottom: 0; left: 0;
  width: 100%; height: 8px;
  background: repeating-linear-gradient(
    -45deg,
    #f5c518,
    #f5c518 10px,
    #1a1a1a 10px,
    #1a1a1a 20px
  );
  z-index: 10;
}

.container {
  position: relative;
  z-index: 5;
  text-align: center;
  padding: 40px 20px;
  max-width: 700px;
  animation: fadeInUp 1s ease forwards;
}

/* Logo */
.logo-wrapper {
  margin-bottom: 40px;
  animation: logoReveal 1.2s ease forwards;
}
.logo-wrapper img {
  width: 220px;
  height: auto;
  filter: drop-shadow(0 4px 30px rgba(245, 197, 24, 0.3));
}

/* Construction badge */
.badge {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  background: #f5c518;
  color: #1a1a1a;
  padding: 10px 28px;
  border-radius: 50px;
  font-size: 18px;
  font-weight: 700;
  margin-bottom: 30px;
  animation: fadeInUp 1s ease 0.3s both;
}
.badge svg {
  width: 24px;
  height: 24px;
}

/* Heading */
h1 {
  font-size: 52px;
  font-weight: 900;
  line-height: 1.3;
  margin-bottom: 20px;
  animation: fadeInUp 1s ease 0.5s both;
}
h1 span {
  color: #f5c518;
}

/* Subtitle */
.subtitle {
  font-size: 22px;
  font-weight: 300;
  color: #ccc;
  margin-bottom: 50px;
  line-height: 1.6;
  animation: fadeInUp 1s ease 0.7s both;
}

/* Divider */
.divider {
  width: 80px;
  height: 4px;
  background: #f5c518;
  margin: 0 auto 40px;
  border-radius: 2px;
  animation: fadeInUp 1s ease 0.6s both;
}

/* Social links */
.social {
  display: flex;
  gap: 20px;
  justify-content: center;
  margin-bottom: 30px;
  animation: fadeInUp 1s ease 0.9s both;
}
.social a {
  width: 50px;
  height: 50px;
  border: 2px solid rgba(245, 197, 24, 0.4);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #f5c518;
  text-decoration: none;
  transition: all 0.3s ease;
}
.social a:hover {
  background: #f5c518;
  color: #1a1a1a;
  border-color: #f5c518;
  transform: translateY(-3px);
}
.social a svg {
  width: 22px;
  height: 22px;
  fill: currentColor;
}

/* Footer text */
.footer-text {
  font-size: 14px;
  color: #666;
  animation: fadeInUp 1s ease 1.1s both;
}
.footer-text a {
  color: #f5c518;
  text-decoration: none;
}

/* Floating particles */
.particle {
  position: absolute;
  width: 6px;
  height: 6px;
  background: #f5c518;
  border-radius: 50%;
  opacity: 0.15;
  z-index: 2;
  animation: float linear infinite;
}

@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(30px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes logoReveal {
  from { opacity: 0; transform: scale(0.8) rotate(-10deg); }
  to { opacity: 1; transform: scale(1) rotate(0deg); }
}
@keyframes float {
  0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
  10% { opacity: 0.15; }
  90% { opacity: 0.15; }
  100% { transform: translateY(-100vh) rotate(720deg); opacity: 0; }
}

/* Responsive */
@media (max-width: 600px) {
  h1 { font-size: 36px; }
  .subtitle { font-size: 18px; }
  .logo-wrapper img { width: 160px; }
  .badge { font-size: 15px; padding: 8px 20px; }
}
</style>
</head>
<body>

<div class="stripes"></div>
<div class="stripes-bottom"></div>

<!-- Floating particles -->
<div class="particle" style="left:10%; animation-duration:12s; animation-delay:0s;"></div>
<div class="particle" style="left:25%; animation-duration:18s; animation-delay:2s; width:4px;height:4px;"></div>
<div class="particle" style="left:40%; animation-duration:15s; animation-delay:4s;"></div>
<div class="particle" style="left:55%; animation-duration:20s; animation-delay:1s; width:8px;height:8px;"></div>
<div class="particle" style="left:70%; animation-duration:14s; animation-delay:3s;"></div>
<div class="particle" style="left:85%; animation-duration:16s; animation-delay:5s; width:4px;height:4px;"></div>
<div class="particle" style="left:95%; animation-duration:22s; animation-delay:0.5s;"></div>

<div class="container">
  <div class="logo-wrapper">
    <!-- Replace src with actual logo path -->
    <img src="%D7%9C%D7%95%D7%92%D7%95%20%D7%AA%D7%9C%D7%9D%20%D7%A9%D7%A7%D7%95%D7%A3%20%D7%A1%D7%95%D7%A4%D7%99.png" alt="תלם מרקט">
  </div>

  <div class="badge">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M2 20h20"/>
      <path d="M5 20V8l7-5 7 5v12"/>
      <path d="M10 20v-6h4v6"/>
    </svg>
    האתר בהקמה
  </div>

  <h1>אנחנו עובדים על<br>משהו <span>מיוחד</span></h1>

  <div class="divider"></div>

  <p class="subtitle">
    האתר החדש של תלם מרקט בדרך אליכם.
  </p>

  <div class="social">
    <!-- Facebook -->
    <a href="https://www.facebook.com/TelemMarket" aria-label="Facebook" target="_blank">
      <svg viewBox="0 0 24 24"><path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"/></svg>
    </a>
    <!-- Instagram -->
    <a href="https://www.instagram.com/telem_supermarket/" aria-label="Instagram" target="_blank">
      <svg viewBox="0 0 24 24"><rect x="2" y="2" width="20" height="20" rx="5" ry="5" fill="none" stroke="currentColor" stroke-width="2"/><circle cx="12" cy="12" r="4.5" fill="none" stroke="currentColor" stroke-width="2"/><circle cx="17.5" cy="6.5" r="1.5" fill="currentColor" stroke="none"/></svg>
    </a>
  </div>

  <p class="footer-text">&copy; 2026 תלם מרקט. כל הזכויות שמורות.</p>
</div>

</body>
</html>
